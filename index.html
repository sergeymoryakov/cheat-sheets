<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="shortcut icon" href="m-gold-s.png" type="image/png" />
        <title>Cheat Sheets</title>
        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <ul id="csList" class="cs-list">
                Error in rendering list of Cheat Sheets
            </ul>
        </div>
        <div id="csPopup" class="cs-popup">
            <div id="csPopupContent" class="cs-popup-content">
                <div class="wrapper-btn" id="wrapperBtn">
                    <button class="return-btn" id="returnBtn">Return</button>
                    <button class="print-btn" id="printBtn">Print</button>
                </div>
                <span class="cs-popup-content_title" id="csTitle"
                    >Error printing title</span
                >
                <span class="cs-popup-content_body" id="csBody"
                    >Error printing body text</span
                >
            </div>
        </div>
        <script type="module" src="index.js"></script>
    </body>
</html>
